<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, user-scalable=no">
    <title>Live Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0f0f0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            zoom: 200%;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            body {
                zoom: 150%;
            }

            .chat-header h3 {
                display: none;
            }
        }

        #main-logo {
            cursor: pointer;
            flex-shrink: 0;
        }

        .chat-container {
            background: #1a1a1a;
            width: 100%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(22, 16, 16, 0.5)
        }

        .chat-header {
            position: fixed;
            top: 0;
            z-index: 10000;
            width: 100%;
            padding: 12px 16px;
            background: #212121;
            border-bottom: 1px solid #303030;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h3 {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .search-container {
            display: flex;
            background: #212121;
            flex: 1;
            min-width: 0;
            gap: 8px;
        }

        .chip-input-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 0;
            padding: 4px 8px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 20px;
            cursor: text;
            transition: border .2s;
        }

        .chip-input-area:focus-within {
            border-color: #3ea6ff;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            white-space: nowrap;
            animation: chipIn 0.2s ease;
        }

        @keyframes chipIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .chip.channel {
            background: #1a3a5c;
            color: #7cb8ff;
        }

        .chip.text {
            background: #2a2a2a;
            color: #ccc;
        }

        .chip.author {
            background: #1a3c1a;
            color: #7cff7c;
        }

        .chip.userId {
            background: #3c2a1a;
            color: #ffb87c;
        }

        .chip.superchat {
            background: #3c3a1a;
            color: #ffe07c;
        }

        .chip-remove {
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .chip-remove:hover {
            opacity: 1;
        }

        .chip-type-select {
            padding: 4px 6px;
            background: #1e1e1e;
            border: 1px solid #404040;
            border-radius: 10px;
            color: #aaa;
            font-size: 11px;
            outline: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .chip-type-select:focus {
            border-color: #3ea6ff;
        }

        .chip-input {
            flex: 1;
            min-width: 80px;
            padding: 4px 0;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .chip-input::placeholder {
            color: #717171;
        }

        .search-input {
            width: 80%;
            flex: 1;
            padding: 8px 12px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: border .2s
        }

        .search-input:focus {
            border-color: #3ea6ff
        }

        .search-input::placeholder {
            color: #717171
        }

        .chat-messages {
            flex: 1;
            padding: 75px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #1a1a1a
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background .2s;
        }

        .message:hover {
            background: #272727
        }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500
        }

        .message-content {
            flex: 1;
            min-width: 0
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .username {
            font-size: 12px;
            color: #3ea6ff;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            word-break: break-all;
        }

        .username:hover {
            text-decoration: underline;
        }

        .badge {
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 2px;
            font-weight: 500
        }

        .badge.member {
            background: #2ba640
        }

        .badge.moderator {
            background: #5e84f1
        }

        .timestamp {
            font-size: 11px;
            color: #717171;
            margin-left: auto
        }

        .message-text {
            font-size: 13px;
            color: #f1f1f1;
            word-wrap: break-word;
            line-height: 1.4;
            cursor: pointer;
            text-decoration: none;
        }

        .message-text:hover {
            text-decoration: underline;
        }

        .highlight {
            background-color: yellow !important;
            transition: background-color 0.5s ease;
        }

        .loading {
            text-align: center;
            padding: 16px;
            color: #717171;
            font-size: 13px
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #303030;
            border-top-color: #3ea6ff;
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        .super-chat {
            width: 100px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .no-more {
            text-align: center;
            padding: 12px;
            color: #717171;
            font-size: 12px;
            background: #252525;
            border-radius: 8px;
            margin: 8px 0
        }

        .status-bar {
            padding: 8px 12px;
            background: #252525;
            text-align: center;
            font-size: 11px;
            color: #717171;
            border-top: 1px solid #303030
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #717171;
            gap: 8px
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>

</head>

<body>
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <svg id="main-logo" width="24" height="24" viewBox="0 0 24 24" fill="#fff">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" />
            </svg>
            <h3>채팅 로그</h3>
            <div class="search-container">
                <div class="chip-input-area" id="chipInputArea">
                    <select id="chipTypeSelect" class="chip-type-select">
                        <option value="text">검색</option>
                        <option value="channel">채널</option>
                        <option value="userId">유저ID</option>
                        <option value="author">작성자</option>
                        <option value="superchat">슈퍼챗</option>
                    </select>
                    <input type="text" class="chip-input" id="chipInput" placeholder="검색어 입력 후 Enter">
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
    </div>
    <script>
        const mainLogo = document.getElementById('main-logo');
        const chatMessages = document.getElementById('chatMessages');
        const chatContainer = document.getElementById('chatContainer');
        const chipInputArea = document.getElementById('chipInputArea');
        const chipInput = document.getElementById('chipInput');
        const chipTypeSelect = document.getElementById('chipTypeSelect');

        const CHIP_LABELS = {
            text: '검색', channel: '채널', userId: '유저',
            author: '작성자', superchat: '슈퍼챗'
        };
        const CHIP_PLACEHOLDERS = {
            text: '검색어 입력 후 Enter',
            channel: '채널 ID 입력 후 Enter',
            userId: '유저 ID 입력 후 Enter',
            author: '작성자 이름 입력 후 Enter',
            superchat: ''
        };
        let loading = false;
        let hasMoreD = true;
        let hasMoreU = true;
        let timer = null;
        let firstID = 0;
        let lastID = 999999999999999;
        let chips = [];

        function makeChip(type, value) {
            if (type === 'superchat')
                return { type: 'superchat', value: '', label: '슈퍼챗' };
            if (!value) return null;
            const label = (CHIP_LABELS[type] || type) + ': ' + value;
            return { type, value, label };
        }

        function parseChipFromText(text) {
            const t = text.trim();
            if (!t) return null;
            if (/^(ch|channel):/.test(t)) return makeChip('channel', t.replace(/^(ch|channel):/, ''));
            if (t.startsWith('@') || t.startsWith('user:')) return makeChip('userId', t.replace(/^(@|user:)/, ''));
            if (t.startsWith('author:')) return makeChip('author', t.replace(/^author:/, ''));
            if (t === 'superchat' || t === 'sc') return makeChip('superchat', '');
            return null;
        }

        function addChipBySelect(value, skipLoad) {
            const type = chipTypeSelect.value;
            const chip = makeChip(type, value);
            if (!chip) return;
            if (chips.some(c => c.type === chip.type && c.value === chip.value)) return;
            chips.push(chip);
            renderChips();
            saveChips();
            if (!skipLoad) load(true, 0, "down");
        }

        function addChip(text, skipLoad) {
            const parsed = parseChipFromText(text);
            if (parsed) {
                if (chips.some(c => c.type === parsed.type && c.value === parsed.value)) return;
                chips.push(parsed);
            } else {
                const chip = makeChip('text', text.trim());
                if (!chip) return;
                if (chips.some(c => c.type === chip.type && c.value === chip.value)) return;
                chips.push(chip);
            }
            renderChips();
            saveChips();
            if (!skipLoad) load(true, 0, "down");
        }

        function removeChip(index) {
            chips.splice(index, 1);
            renderChips();
            saveChips();
            load(true, 0, "down");
        }

        function clearChips(skipLoad) {
            chips = [];
            renderChips();
            saveChips();
            if (!skipLoad) load(true, 0, "down");
        }

        function renderChips() {
            chipInputArea.querySelectorAll('.chip').forEach(el => el.remove());
            chips.forEach((chip, i) => {
                const el = document.createElement('span');
                el.className = 'chip ' + chip.type;
                el.innerHTML = chip.label + '<span class="chip-remove" data-index="' + i + '">&times;</span>';
                chipInputArea.insertBefore(el, chipInput);
            });
            adjustContentMargin();
        }

        function saveChips() {
            localStorage.setItem('chatChips', JSON.stringify(chips));
        }

        function loadSavedChips() {
            try {
                const saved = localStorage.getItem('chatChips');
                if (saved) { chips = JSON.parse(saved); renderChips(); }
            } catch (e) { chips = []; }
        }

        function getFiltersParam() {
            return encodeURIComponent(JSON.stringify(
                chips.map(c => ({ type: c.type, value: c.value }))
            ));
        }

        function decodeMessage(b64) {
            if (!b64) return {};
            try {
                const bin = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
                const raw = pako.inflateRaw(bin, { to: 'string' });
                return JSON.parse(raw);
            } catch (e) { return {}; }
        }

        function render(element) {
            const message = decodeMessage(element.message);
            const d = document.createElement('div');
            d.className = 'message';
            d.setAttribute("data-id", element.id);
            d.setAttribute("data-channel", element.channel);
            d.innerHTML = `
        <img class="avatar" src="${element.authorThumb}" width="24" height="24">
        <div class="message-content">
            <div class="message-header">
                <span class="username" data-user="${element.authorId}">${element.author}</span>
                <span class="timestamp">${element.channel} - ${toTimeString(new Date(element.timestamp))}</span>
            </div>
            <div class="message-text">
                ${message.s ? `<div class="super-chat" style="background-color:${message.s.color};">${message.s.amount}</div>` : ''}
                ${message.m.map(e => {
                if (e.url)
                    return `<img src="${e.url}" width="24" height="24">`;
                return e.text;
            }).join('')}
            </div>
        </div>`;
            const e2 = d.getElementsByClassName("message-text")[0];
            e2.addEventListener('dblclick', function (e) {
                e.preventDefault();
                const channel = findParentDataId(e.target, "data-channel");
                const targetID = parseInt(findParentDataId(e.target, "data-id"));
                clearChips(true);
                addChip('ch:' + channel, true);
                load(true, targetID, "up|down").then(() => {
                    const el = document.querySelector(`[data-id='${targetID}']`);
                    if (el) {
                        el.classList.add("highlight");
                        setTimeout(() => el.classList.remove("highlight"), 500);
                        el.scrollIntoView({ behavior: "auto", block: "center" });
                    }
                });
            });
            const e3 = d.getElementsByClassName("username")[0];
            e3.addEventListener('dblclick', function (e) {
                e.preventDefault();
                addChip('@' + e.target.getAttribute("data-user"));
            });
            return d;
        }
        function setScrollPos(pos) {
            document.documentElement.scrollTop = pos;
        }
        function toTimeString(now) {
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }

        function showLoading() {
            const d = document.createElement('div');
            d.className = 'loading';
            d.id = 'loader';
            d.innerHTML = '<div class="spinner"></div> 로딩중...';
            chatMessages.appendChild(d);
        }
        function hideLoading() {
            const l = document.getElementById('loader');
            l && l.remove();
        }
        function showEnd() {
            const d = document.createElement('div');
            d.className = 'no-more';
            d.textContent = '더 이상 메시지가 없습니다';
            chatMessages.appendChild(d);
        }
        function showEmpty() {
            chatMessages.innerHTML = '<div class="empty">' +
                '<svg width="48" height="48" viewBox="0 0 24 24" fill="#717171">' +
                '<path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>' +
                '</svg>' +
                '<span>검색 결과가 없습니다</span>' +
                '</div>';
        }
        async function load(reset = false, targetID = 0, dir = "down") {
            if (!reset) {
                if (!hasMoreD && dir.includes("down")) return;
                if (!hasMoreU && dir.includes("up")) return;
            }
            if (reset) {
                hasMoreD = hasMoreU = true;
                firstID = 0;
                lastID = 999999999999999;
                if (timer) { clearTimeout(timer); timer = null; }
                chatMessages.innerHTML = '';
                setScrollPos(0);
                if (targetID > 0) lastID = firstID = targetID;
            }
            const filtersParam = getFiltersParam();
            const getContents = async (a, b) => {
                showLoading();
                try {
                    const res = await fetch(
                        `/${a}?filters=${filtersParam}&start=${b}`
                    );
                    const json = await res.json();
                    hideLoading();
                    if (json.length > 0) {
                        if (a === "data") {
                            const frag = document.createDocumentFragment();
                            json.forEach(m => frag.appendChild(render(m)));
                            chatMessages.appendChild(frag);
                            const l_id = json[json.length - 1].id;
                            if (l_id < lastID) lastID = l_id;
                        }
                        else if (a === "udata") {
                            const scrollHeight = document.documentElement.scrollHeight;
                            const frag = document.createDocumentFragment();
                            json.forEach(m => frag.appendChild(render(m)));
                            chatMessages.prepend(frag);
                            setScrollPos(document.documentElement.scrollHeight - scrollHeight);
                            const f_id = json[0].id;
                            if (firstID === 0 || f_id < firstID) firstID = f_id;
                            const l_id = json[json.length - 1].id;
                            if (l_id >= firstID) firstID = l_id + 1;
                        }
                    } else {
                        if (dir.includes("up")) hasMoreU = false;
                        if (dir.includes("down")) {
                            hasMoreD = false;
                            lastID === 999999999999999 ? showEmpty() : showEnd();
                        }
                    }
                } catch (e) {
                    hideLoading();
                    console.error(e);
                    return false;
                }
                return true;
            };
            loading = true;
            if (dir.includes("up")) await getContents("udata", firstID);
            if (dir.includes("down")) await getContents("data", lastID);
            loading = false;
        }
        let scrollTicking = false;
        function onScroll() {
            if (scrollTicking) return;
            scrollTicking = true;
            requestAnimationFrame(() => {
                scrollTicking = false;
                const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
                const bottom = scrollHeight - scrollTop - clientHeight;
                if (loading) return;
                if (bottom < 200 && hasMoreD) load(false, 0, "down");
                else if (scrollTop < 100 && hasMoreU && firstID > 0) load(false, 0, "up");
            });
        }
        function findParentDataId(element, attr) {
            let current = element.parentNode;
            while (current && current.nodeType === 1) {
                if (current.hasAttribute(attr)) return current.getAttribute(attr);
                current = current.parentNode;
            }
            return null;
        }
        function adjustContentMargin() {
            const header = document.querySelector('.chat-header');
            const content = document.querySelector('.chat-messages');
            content.style.paddingTop = (header.offsetHeight + 20) + 'px';
        }

        // chip 클릭 이벤트 (삭제 버튼)
        chipInputArea.addEventListener('click', (e) => {
            if (e.target.classList.contains('chip-remove')) {
                removeChip(parseInt(e.target.getAttribute('data-index')));
            }
            if (e.target !== chipTypeSelect) {
                chipInput.focus();
            }
        });

        // 콤보박스 변경 이벤트
        chipTypeSelect.addEventListener('change', () => {
            const type = chipTypeSelect.value;
            chipInput.placeholder = CHIP_PLACEHOLDERS[type] || '';
            if (type === 'superchat') {
                addChipBySelect('', false);
                chipTypeSelect.value = 'text';
                chipInput.placeholder = CHIP_PLACEHOLDERS['text'];
            } else {
                chipInput.focus();
            }
        });

        // chip 입력 이벤트
        chipInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && chipInput.value.trim()) {
                e.preventDefault();
                addChipBySelect(chipInput.value.trim());
                chipInput.value = '';
            }
            if (e.key === 'Backspace' && !chipInput.value && chips.length > 0) {
                removeChip(chips.length - 1);
            }
        });

        // 초기화
        loadSavedChips();
        window.addEventListener('scroll', onScroll);
        window.addEventListener('resize', adjustContentMargin);
        mainLogo.addEventListener('mousedown', (e) => {
            e.preventDefault();
            clearChips();
        });
        load(false, 0, "down");
        adjustContentMargin();
    </script>
</body>

</html>
